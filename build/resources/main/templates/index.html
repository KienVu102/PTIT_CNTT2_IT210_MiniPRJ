<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{app.title}">Quản Lý Todo</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 20px; }
        .container { max-width: 900px; margin: 0 auto; }

        .page-header {
            display: flex; justify-content: space-between;
            margin-bottom: 20px;
        }
        .page-header h1 { font-size: 22px; }
        .owner-tag {
            font-size: 14px; color: #555;
            background: #fff; border: 1px solid #ddd;
            padding: 5px 10px;
        }
        .owner-tag span { font-weight: bold; color: #333; }

        .top-bar {
            text-align: right; margin-bottom: 15px;
        }
        .lang-btn, .btn-logout {
            font-size: 12px; padding: 4px 8px; margin-left: 5px;
            border: 1px solid #333; color: #333;
            text-decoration: none; background: #fff;
        }
        .lang-btn:hover, .btn-logout:hover { background: #333; color: #fff; }

        .alert-success, .alert-error {
            padding: 10px; margin-bottom: 15px; border: 1px solid;
        }
        .alert-success { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        .toolbar { text-align: right; margin-bottom: 15px; }
        .btn-add {
            background: #333; color: #fff; border: none;
            padding: 8px 15px; font-size: 14px; text-decoration: none;
        }

        table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #ddd; }
        th { background: #333; color: #fff; padding: 10px; text-align: left; font-size: 14px; }
        td { padding: 10px; font-size: 14px; border-bottom: 1px solid #ddd; }
        tr:last-child td { border-bottom: none; }

        .badge { padding: 2px 8px; font-size: 11px; border-radius: 10px; }
        .badge-PENDING     { background: #fff3cd; color: #856404; }
        .badge-IN_PROGRESS { background: #cce5ff; color: #004085; }
        .badge-DONE        { background: #d4edda; color: #155724; }
        .badge-LOW         { background: #e2e3e5; color: #383d41; }
        .badge-MEDIUM      { background: #fff3cd; color: #856404; }
        .badge-HIGH        { background: #f8d7da; color: #721c24; }

        .btn-edit, .btn-delete {
            padding: 4px 8px; font-size: 12px; text-decoration: none;
            margin-right: 5px;
        }
        .btn-edit   { background: #ffc107; color: #000; }
        .btn-delete { background: #dc3545; color: #fff; }

        .empty-msg { text-align: center; padding: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <a class="lang-btn" th:href="@{/(lang='vi')}" th:text="#{index.lang.vi}">Tiếng Việt</a>
        <a class="lang-btn" th:href="@{/(lang='en')}" th:text="#{index.lang.en}">English</a>
        <a class="btn-logout" th:href="@{/logout}" th:text="#{index.btn.logout}">Đăng Xuất</a>
    </div>

    <div class="page-header">
        <h1 th:text="#{index.heading}">Quản Lý Todo</h1>
        <div class="owner-tag">
            <!-- Lấy ownerName trực tiếp từ Session qua Thymeleaf -->
            <span th:text="#{index.owner}">Danh sách của</span>:
            <span th:text="${session.ownerName}">Tên</span>
        </div>
    </div>

    <div class="alert-success" th:if="${message != null}">
        <span th:text="${message == 'success.create'} ? #{msg.success.create}
                     : (${message == 'success.update'} ? #{msg.success.update}
                     : #{msg.success.delete})"></span>
    </div>

    <div class="alert-error" th:if="${error != null}">
        <span th:text="${error == 'error.notfound'} ? #{msg.error.notfound} : #{msg.error.delete}"></span>
    </div>

    <div class="toolbar">
        <a class="btn-add" th:href="@{/todos/create}" th:text="#{index.btn.add}">+ Thêm Task Mới</a>
    </div>

    <table>
        <thead>
            <tr>
                <th th:text="#{table.no}">#</th>
                <th th:text="#{table.content}">Nội Dung</th>
                <th th:text="#{table.dueDate}">Ngày Hết Hạn</th>
                <th th:text="#{table.status}">Trạng Thái</th>
                <th th:text="#{table.priority}">Ưu Tiên</th>
                <th th:text="#{table.action}">Hành Động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="todo, stat : ${todos}">
                <td th:text="${stat.index + 1}">1</td>
                <td th:text="${todo.content}">Nội dung</td>
                <td th:text="${#temporals.format(todo.dueDate, 'dd/MM/yyyy')}">01/01/2025</td>
                <td>
                    <span class="badge"
                          th:classappend="'badge-' + ${todo.status}"
                          th:text="${todo.status}">PENDING</span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="'badge-' + ${todo.priority}"
                          th:text="${todo.priority}">MEDIUM</span>
                </td>
                <td>
                    <a class="btn-edit"
                       th:href="@{/todos/edit/{id}(id=${todo.id})}"
                       th:text="'' + #{btn.edit}">Sửa</a>

                    <a class="btn-delete"
                       th:href="@{/todos/delete/{id}(id=${todo.id})}"
                       th:onclick="'return confirm(\'' + #{confirm.delete} + '\')'"><span th:text="#{btn.delete}">Xóa</span></a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(todos)}">
                <td colspan="6" class="empty-msg" th:text="#{msg.empty}">Chưa có task nào.</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
