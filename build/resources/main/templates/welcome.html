<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{welcome.title}">Todo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff; border: 1px solid #ddd;
            padding: 30px; width: 100%; max-width: 400px;
            text-align: center;
        }
        .icon { font-size: 40px; margin-bottom: 15px; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        p  { color: #666; font-size: 14px; margin-bottom: 20px; }

        label {
            display: block; text-align: left; font-size: 14px;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            font-size: 14px; margin-bottom: 5px;
        }
        input.is-invalid { border-color: red; }
        .field-error {
            color: red; font-size: 12px; text-align: left;
            display: block; margin-bottom: 15px;
        }
        .btn-start {
            width: 100%; background: #333; color: #fff;
            border: none; padding: 12px;
            font-size: 16px; cursor: pointer;
        }

        .lang-bar {
            position: absolute; top: 20px; right: 20px;
        }
        .lang-bar a {
            color: #333; font-size: 12px; text-decoration: none;
            margin-left: 10px;
            border: 1px solid #333; padding: 4px 8px;
        }
        .lang-bar a:hover { background: #333; color: #fff; }
    </style>
</head>
<body>

<div class="lang-bar">
    <a th:href="@{/welcome(lang='vi')}" th:text="#{index.lang.vi}">Tiếng Việt</a>
    <a th:href="@{/welcome(lang='en')}" th:text="#{index.lang.en}">English</a>
</div>

<div class="card">
    <div class="icon">📋</div>
    <h1 th:text="#{welcome.heading}">Xin Chào!</h1>
    <p th:text="#{welcome.title}">Ứng dụng quản lý Todo cá nhân</p>
    <form th:action="@{/welcome}" method="post">
        <label th:text="#{welcome.label}">Tên Chủ Sở Hữu</label>
        <input type="text" name="ownerName"
               th:placeholder="#{welcome.placeholder}"
               th:classappend="${error != null} ? 'is-invalid' : ''"
               autofocus>
        <span class="field-error"
              th:if="${error != null}"
              th:text="#{welcome.error.required}"></span>

        <button type="submit" class="btn-start" th:text="#{welcome.button}">Bắt Đầu</button>
    </form>
</div>
</body>
</html>
