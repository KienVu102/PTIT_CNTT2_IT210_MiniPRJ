<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit} ? #{form.title.edit} : #{form.title.create}">Form Todo</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 20px; }
        .container { max-width: 500px; margin: 0 auto; }

        .top-bar {
            text-align: right; margin-bottom: 20px;
        }
        .lang-btn {
            font-size: 12px; padding: 4px 8px; margin-left: 5px;
            border: 1px solid #333; color: #333;
            text-decoration: none; background: #fff;
        }
        .lang-btn:hover { background: #333; color: #fff; }

        h1 { font-size: 20px; margin-bottom: 20px; }
        .card {
            background: #fff; border: 1px solid #ddd;
            padding: 20px;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; margin-bottom: 5px; }
        input[type="text"], input[type="date"], select {
            width: 100%; padding: 8px; border: 1px solid #ccc;
            font-size: 14px;
        }
        .field-error { color: red; font-size: 12px; margin-top: 3px; }
        input.is-invalid, select.is-invalid { border-color: red; }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-submit {
            flex: 1; background: #333; color: #fff; border: none;
            padding: 10px; font-size: 14px; cursor: pointer;
        }
        .btn-cancel {
            flex: 1; background: #ccc; color: #333; border: none;
            padding: 10px; font-size: 14px;
            text-align: center; display: inline-block; text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <a class="lang-btn" th:href="${isEdit} ? @{/todos/edit/{id}(id=${todo.id},lang='vi')} : @{/todos/create(lang='vi')}"
           th:text="#{index.lang.vi}">Tiếng Việt</a>
        <a class="lang-btn" th:href="${isEdit} ? @{/todos/edit/{id}(id=${todo.id},lang='en')} : @{/todos/create(lang='en')}"
           th:text="#{index.lang.en}">English</a>
    </div>

    <h1 th:text="${isEdit} ? #{form.title.edit} : #{form.title.create}">Form</h1>

    <div class="card">
        <form th:action="${formAction}" th:object="${todo}" method="post">

            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label th:text="#{form.label.content}">Nội Dung Task <span style="color:red">*</span></label>
                <input type="text" id="content"
                       th:field="*{content}"
                       th:placeholder="#{form.placeholder.content}"
                       th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''">
                <span class="field-error"
                      th:if="${#fields.hasErrors('content')}"
                      th:errors="*{content}"></span>
            </div>

            <div class="form-group">
                <label th:text="#{form.label.dueDate}">Ngày Hết Hạn <span style="color:red">*</span></label>
                <input type="date" id="dueDate"
                       th:field="*{dueDate}"
                       th:classappend="${#fields.hasErrors('dueDate')} ? 'is-invalid' : ''">
                <span class="field-error"
                      th:if="${#fields.hasErrors('dueDate')}"
                      th:errors="*{dueDate}"></span>
            </div>

            <div class="form-group">
                <label th:text="#{form.label.status}">Trạng Thái</label>
                <select id="status" th:field="*{status}">
                    <option value="PENDING"     th:text="#{status.PENDING}">Chờ Xử Lý</option>
                    <option value="IN_PROGRESS" th:text="#{status.IN_PROGRESS}">Đang Làm</option>
                    <option value="DONE"        th:text="#{status.DONE}">Hoàn Thành</option>
                </select>
            </div>

            <div class="form-group">
                <label th:text="#{form.label.priority}">Mức Ưu Tiên</label>
                <select id="priority" th:field="*{priority}">
                    <option value="LOW"    th:text="#{priority.LOW}">Thấp</option>
                    <option value="MEDIUM" th:text="#{priority.MEDIUM}">Trung Bình</option>
                    <option value="HIGH"   th:text="#{priority.HIGH}">Cao</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" th:text="#{btn.save}">Lưu</button>
                <a class="btn-cancel" th:href="@{/}" th:text="'← ' + #{btn.back}">← Quay Lại</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
